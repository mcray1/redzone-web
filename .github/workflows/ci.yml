name: CI

# Catch TypeScript/build errors BEFORE Render deploys — a failed build here means
# a red X on the commit, instead of Render silently serving the previous bundle.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      # Unit + component tests (Vitest/RTL). Fast, no browser needed.
      # The Playwright browser smoke (npm run e2e) needs `npx playwright install`
      # + a dev server, so it is run manually rather than on every push.
      - run: npm test
      - run: npm run build
